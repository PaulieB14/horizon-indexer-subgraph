specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: HorizonStaking
    network: arbitrum-one
    source:
      address: "0x00669A4CF01450B64E8A2A20E9b1FCB71E61eF03"
      abi: HorizonStaking
      startBlock: 200000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Indexer
        - Operator
      abis:
        - name: HorizonStaking
          file: ./abis/HorizonStaking.json
      eventHandlers:
        - event: OperatorSet(indexed address,indexed address,indexed address,bool)
          handler: handleOperatorSet
      file: ./src/staking.ts

  - kind: ethereum
    name: SubgraphService
    network: arbitrum-one
    source:
      address: "0xb2Bb92d0DE618878E438b55D5846cfecD9301105"
      abi: SubgraphService
      startBlock: 200000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Indexer
        - Allocation
        - RewardEvent
        - QueryFeeEvent
      abis:
        - name: SubgraphService
          file: ./abis/SubgraphService.json
      eventHandlers:
        - event: AllocationCreated(indexed address,indexed address,indexed bytes32,uint256,uint256)
          handler: handleAllocationCreated
        - event: AllocationClosed(indexed address,indexed address,indexed bytes32,uint256,bool)
          handler: handleAllocationClosed
        - event: AllocationResized(indexed address,indexed address,indexed bytes32,uint256,uint256)
          handler: handleAllocationResized
        - event: IndexingRewardsCollected(indexed address,indexed address,indexed bytes32,uint256,uint256,uint256,bytes32,bytes,uint256)
          handler: handleIndexingRewardsCollected
        - event: QueryFeesCollected(indexed address,indexed address,indexed address,bytes32,uint256,uint256)
          handler: handleQueryFeesCollected
      file: ./src/subgraphService.ts

  - kind: ethereum
    name: StakingExtension
    network: arbitrum-one
    source:
      address: "0x3bE385576d7C282070Ad91BF94366de9f9ba3571"
      abi: StakingExtension
      startBlock: 200000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Indexer
        - Delegation
      abis:
        - name: StakingExtension
          file: ./abis/StakingExtension.json
      eventHandlers:
        - event: StakeDelegated(indexed address,indexed address,uint256,uint256)
          handler: handleStakeDelegated
        - event: StakeDelegatedLocked(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleStakeDelegatedLocked
        - event: StakeDelegatedWithdrawn(indexed address,indexed address,uint256)
          handler: handleStakeDelegatedWithdrawn
      file: ./src/delegation.ts
